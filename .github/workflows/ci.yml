name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run tests
        run: zig build test

      - name: Build C ABI
        run: zig build c-api

  c-api-cross:
    name: c-api cross targets
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build iOS C ABI static
        run: zig build c-api-static -Dtarget=aarch64-ios -Doptimize=ReleaseFast

      - name: Build Android C ABI static
        run: zig build c-api-static -Dtarget=aarch64-linux-android.21 -Doptimize=ReleaseFast
